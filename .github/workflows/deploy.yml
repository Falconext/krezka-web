name: Deploy to Vercel (krezka + falconext)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy — krezka
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_KREZKA }}"

      - name: Trigger Vercel deploy — falconext
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_FALCONEXT }}"
